worker_processes 1;

events
{
        worker_connections 1024;
}


http
{
        sendfile on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $server_name;

        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        client_max_body_size 500M ;

        server_tokens off;
        server
        {
                listen 80;
                listen [::]:80;
                server_name jonasjschreiber.com www.jonasjschreiber.com;

                location ^~ /.well-known/acme-challenge/
                {
                        root /var/www/certbot;
                        default_type "text/plain";
                        try_files $uri =404;
                }

                location /
                {
                        return 301 https://www.jonasjschreiber.com$request_uri;
                }
        }

        server
        {
                listen 80;
                listen [::]:80;
                server_name grafana.jonasjschreiber.com;

                location ^~ /.well-known/acme-challenge/
                {
                        root /var/www/certbot;
                        default_type "text/plain";
                        try_files $uri =404;
                }

                location /
                {
                        return 301 https://grafana.jonasjschreiber.com$request_uri;
                }
        }
        server
        {
                listen 80;
                listen [::]:80;
                server_name rainblet-api.jonasjschreiber.com;

                location ^~ /.well-known/acme-challenge/
                {
                        root /var/www/certbot;
                        default_type "text/plain";
                        try_files $uri =404;
                }

                location /
                {
                        return 301 https://rainblet-api.jonasjschreiber.com$request_uri;
                }
        }
        server
        {
                listen 80;
                listen [::]:80;
                server_name rainblet.jonasjschreiber.com;

                location ^~ /.well-known/acme-challenge/
                {
                        root /var/www/certbot;
                        default_type "text/plain";
                        try_files $uri =404;
                }

                location /
                {
                        return 301 https://rainblet.jonasjschreiber.com$request_uri;
                }
        }
        server
        {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name www.jonasjschreiber.com;

                ssl_certificate /etc/nginx/ssl/live/www.jonasjschreiber.com/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/live/www.jonasjschreiber.com/privkey.pem;

                location /
                {
                        proxy_pass http://wordpress:80;
                        proxy_redirect off;
                }
        }
        server
        {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name grafana.jonasjschreiber.com;

                ssl_certificate /etc/nginx/ssl/live/grafana.jonasjschreiber.com/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/live/grafana.jonasjschreiber.com/privkey.pem;

                location /
                {
                        proxy_pass http://grafana:3000;
                        proxy_redirect off;
                }
        }

        server
        {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name rainblet.jonasjschreiber.com;

                ssl_certificate /etc/nginx/ssl/live/rainblet.jonasjschreiber.com/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/live/rainblet.jonasjschreiber.com/privkey.pem;

                resolver 127.0.0.11 ipv6=off valid=10s;
                set $frontend_upstream frontend:80;

                location /
                {
                        proxy_pass http://$frontend_upstream;
                        proxy_redirect off;
                }
        }

        server
        {
                listen 443 ssl http2;
                listen [::]:443 ssl http2;
                server_name rainblet-api.jonasjschreiber.com;

                ssl_certificate /etc/nginx/ssl/live/rainblet-api.jonasjschreiber.com/fullchain.pem;
                ssl_certificate_key /etc/nginx/ssl/live/rainblet-api.jonasjschreiber.com/privkey.pem;

                location /
                {
                        proxy_pass http://backend:8080;
                        proxy_redirect off;
                }
        }
}
